name: Scraper Vagas

on:
  schedule:
    - cron: "0 * * * *" # Executa de hora em hora
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Chromium do Playwright
        run: |
          playwright install chromium --with-deps

      - name: Executar scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          CANAL_ID: ${{ secrets.CANAL_ID }}
          INFOJOBS_LOG: ${{ secrets.INFOJOBS_LOG }}
          LINKEDIN_LOG: ${{ secrets.LINKEDIN_LOG }}
        run: python -m app.scripts.run_scraper

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-debug
          path: |
            linkedin_debug.png
            *.png
          if-no-files-found: ignore