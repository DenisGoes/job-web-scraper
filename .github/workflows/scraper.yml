name: Scraper Vagas

on:
  schedule:
    - cron: "0 * * * *" # Executa de hora em hora
  workflow_dispatch: # Permite executar manualmente pelo GitHub

jobs:
  run-scraper:

    runs-on: ubuntu-latest

    steps:

      - name: Baixar código
        uses: actions/checkout@v4


      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      - name: Instalar Chromium do Playwright
        run: |
          playwright install chromium --with-deps


      - name: Executar scraper
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
          CANAL_ID: ${{ secrets.CANAL_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}

        run: python -m app.scripts.run_scraper